/* ─── Utility ─── */
function timeAgo(iso) {
  const d = new Date(iso), now = new Date();
  const diff = now - d;
  if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h`;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function avatar(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function avatarColor(name) {
  const colors = ['#004E6E','#8DC63F','#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981'];
  let h = 0; for (let c of name) h = ((h<<5)-h)+c.charCodeAt(0);
  return colors[Math.abs(h) % colors.length];
}

              onMouseLeave={e=>{ if(!active) e.currentTarget.style.background = !email.is_read ? 'rgba(141,198,63,0.04)' : T.surface; }}>

              <div style={{ display:'flex', alignItems:'flex-start', gap:10 }}>

                    {email.priority && <span style={{ fontSize:10.5, fontWeight:600, padding:'2px 7px', borderRadius:20, background:pc.bg, color:pc.text }}>{pc.label}</span>}

          </div>
        </div>

                <SparkleIcon size={14} color="currentColor" /> Reply with AI

                      <button onClick={()=>setShowDraft(false)} style={{ marginLeft:'auto', fontSize:12, color:T.muted }}>Edit prompt</button>
                    </div>
                    <textarea value={generatedDraft} onChange={e=>setGeneratedDraft(e.target.value)} rows={7}
                      style={{ width:'100%', fontSize:13, color:T.text, lineHeight:1.7, resize:'none', border:'none', background:'transparent', outline:'none', fontFamily:'inherit' }} />

                {!showDraft && (
                  <div style={{ padding:'12px 16px', borderBottom:`1px solid ${T.border}` }}>

                <div style={{ padding:'10px 14px', background:T.bg, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <button onClick={()=>{ setReplying(false); setShowDraft(false); setPrompt(''); setGeneratedDraft(''); }} style={{ fontSize:13, color:T.muted }}>Cancel</button>

                      <button onClick={handleGenerate} disabled={!prompt.trim()||generating} style={{
                        display:'flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:9,

                        fontWeight:600, fontSize:13, background:'#fff', transition:'all 0.15s',
                        opacity: prompt.trim() ? 1 : 0.5, cursor: prompt.trim() ? 'pointer' : 'not-allowed',
                      }}>
                        {generating ? <span className="spin"><SyncIcon size={13} /></span> : <SparkleIcon size={13} color={T.teal} />}
                        {generating ? 'Generating…' : 'Generate'}
                      </button>
                    )}
                    {showDraft && (
                      <button onClick={handleGenerate} disabled={generating} style={{
                        display:'flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:9,
                        border:`1px solid ${T.border}`, color:T.teal, fontWeight:600, fontSize:13, background:'#fff',
                      }}>
                        <span className={generating?'spin':''}><SyncIcon size={13} color={T.teal} /></span>
                        Regenerate
                      </button>
                    )}
                    <button onClick={handleSend} disabled={sending||(showDraft?!generatedDraft.trim():!prompt.trim())} style={{
                      display:'flex', alignItems:'center', gap:7, padding:'8px 18px', borderRadius:9,
                      background: T.teal, color:'#fff', fontWeight:600, fontSize:13,
                      boxShadow:'0 2px 8px rgba(0,78,110,0.25)', transition:'all 0.15s',
                      opacity: (sending||(showDraft?!generatedDraft.trim():!prompt.trim())) ? 0.6 : 1,
                    }}
                      onMouseEnter={e=>{ if(!sending) e.currentTarget.style.background=T.tealL; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background=T.teal; }}>
                      {sending ? <span className="spin"><SyncIcon size={13} color="#fff" /></span> : <SendIcon size={13} color="#fff" />}
                      {sending ? 'Sending…' : 'Send Reply'}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Chat view ─── */
function ChatView() {
  const [messages, setMessages] = useState([
    { role:'assistant', text:"Hi James! I'm your MailMind AI. Ask me anything about your inbox — I can summarise emails, find follow-ups, draft replies, or analyse trends." },
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  const QUICK = ['Show urgent emails','Emails needing reply',"Today's summary",'Show complaints'];

  async function send(text) {
    const q = text || input.trim();
    if (!q) return;
    setMessages(m=>[...m,{role:'user',text:q}]);
    setInput('');
    setLoading(true);
    await new Promise(r=>setTimeout(r,1600));
    const responses = {
      'show urgent emails':'You have 3 high-priority emails: Sarah\'s Q2 proposal (action required), David\'s overdue invoice for £4,200, and Rachel\'s complaint about delayed order #8842. Want me to help draft replies for any of these?',
      'emails needing reply':'There are 3 emails requiring a reply: Sarah Mitchell\'s Q2 proposal, David Chen\'s overdue invoice, and Rachel Kim\'s complaint about order #8842. I can draft replies for all three if you\'d like.',
      "today's summary":"Today you received 2 new emails: Sarah Mitchell needs a call about the Q2 proposal (budget, timeline, legal), and a GitHub PR merge notification for your multi-account sync feature. Your inbox has 3 unread messages total.",
      'show complaints':'Found 1 complaint: Rachel Kim from BigClient Ltd is reporting a 6-day delay on order #8842 with no communication. This is marked High Priority. Shall I draft an urgent apology and resolution plan?',
    };
    const reply = responses[q.toLowerCase()] || `I searched your inbox for "${q}". I found several relevant emails across your 3 connected accounts. Would you like me to summarise them or help draft a response?`;
    setMessages(m=>[...m,{role:'assistant',text:reply}]);
    setLoading(false);
  }

  useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background:T.bg, height:'100%' }}>
      <div style={{ padding:'16px 20px', borderBottom:`1px solid ${T.border}`, background:T.surface }}>
        <h1 style={{ fontSize:18, fontWeight:700, color:T.text }}>AI Chat</h1>
        <p style={{ fontSize:12.5, color:T.muted, marginTop:2 }}>Ask anything about your emails</p>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'20px', display:'flex', flexDirection:'column', gap:12 }}>
        {messages.map((m,i)=>(
          <div key={i} style={{ display:'flex', justifyContent: m.role==='user' ? 'flex-end' : 'flex-start' }}>
            {m.role==='assistant' && (
              <div style={{ width:32, height:32, borderRadius:9, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', marginRight:8, flexShrink:0, marginTop:2, boxShadow:'0 2px 8px rgba(0,0,0,0.15)', overflow:'hidden', padding:4 }}>
                <img src="assets/mailmind-logo.png" alt="AI" style={{ width:'100%', height:'100%', objectFit:'contain' }} />
              </div>
            )}
            <div style={{
              maxWidth:'72%', padding:'11px 15px', borderRadius: m.role==='user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
              background: m.role==='user' ? T.teal : T.surface,
              color: m.role==='user' ? '#fff' : T.text,
              fontSize:13.5, lineHeight:1.65, boxShadow: m.role==='assistant' ? '0 1px 4px rgba(0,0,0,0.06)' : 'none',
              border: m.role==='assistant' ? `1px solid ${T.border}` : 'none',
            }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display:'flex', alignItems:'flex-end', gap:9 }} className="fade-up">
            <div style={{ width:32, height:32, borderRadius:9, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, boxShadow:'0 2px 10px rgba(0,0,0,0.12)', overflow:'hidden', padding:4 }}>
              <img src="assets/mailmind-logo.png" alt="AI" style={{ width:'100%', height:'100%', objectFit:'contain' }} />
            </div>
            <div style={{ padding:'13px 16px 11px', background:T.surface, borderRadius:'16px 16px 16px 4px', border:`1px solid ${T.border}`, boxShadow:'0 3px 14px rgba(0,0,0,0.07)', minWidth:170 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                <span style={{ fontSize:12, color:'#1A6B3C', fontWeight:600, letterSpacing:'0.01em' }}>Thinking</span>
                <span style={{ display:'flex', gap:3 }}>
                  {[0,1,2].map(i=><span key={i} style={{ width:5, height:5, borderRadius:'50%', background:'#1A6B3C', display:'inline-block', animation:`thinkDot 1.3s ${i*0.2}s ease-in-out infinite` }} />)}
                </span>
              </div>
              <div style={{ height:3, borderRadius:3, background:'#e8f5e9', overflow:'hidden' }}>
                <div style={{ height:'100%', borderRadius:3, background:'linear-gradient(90deg,#1A6B3C,#3fc64e)', animation:'thinkScan 1.8s ease-in-out infinite' }} />
              </div>
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* Quick prompts */}
      <div style={{ padding:'0 20px 10px', display:'flex', gap:6, flexWrap:'wrap' }}>
        {QUICK.map(q=>(
          <button key={q} onClick={()=>send(q)} style={{ fontSize:12, padding:'6px 12px', borderRadius:20, border:`1px solid ${T.border}`, background:T.surface, color:T.muted, transition:'all 0.12s' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=T.teal; e.currentTarget.style.color=T.teal; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=T.border; e.currentTarget.style.color=T.muted; }}>
            {q}
          </button>
        ))}
      </div>

      {/* Input */}
      <div style={{ padding:'10px 16px 16px', borderTop:`1px solid ${T.border}`, background:T.surface }}>
        <div style={{ display:'flex', gap:10, alignItems:'flex-end', background:T.bg, borderRadius:12, padding:'10px 12px', border:`1.5px solid ${T.border}` }}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}
            placeholder="Ask about your emails…" rows={1}
            style={{ flex:1, border:'none', background:'transparent', outline:'none', fontSize:13.5, color:T.text, resize:'none', lineHeight:1.5, fontFamily:'inherit', maxHeight:100, overflow:'auto' }} />
          <button onClick={()=>send()} disabled={!input.trim()} style={{
            width:34, height:34, borderRadius:9, background: input.trim() ? T.teal : T.border,
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all 0.15s',
          }}>
            <SendIcon size={14} color="#fff" />
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Compose Modal ─── */
function ComposeModal({ onClose }) {
  const [to, setTo] = useState('');
  const [subject, setSubject] = useState('');
  const [prompt, setPrompt] = useState('');
  const [fromId, setFromId] = useState(ACCOUNTS[0].id);
  const [tone, setTone] = useState('professional');
  const [generating, setGenerating] = useState(false);
  const [draft, setDraft] = useState('');
  const [sent, setSent] = useState(false);
  const TONES = ['professional','friendly','formal','concise'];

  async function generate() {
    if (!prompt.trim()) return;
    setGenerating(true);
    await new Promise(r=>setTimeout(r,1600));
    setDraft(`Dear ${to||'Recipient'},\n\n${prompt}\n\nBest regards,\nJames Miller`);
    setGenerating(false);
  }

  async function handleSend() {
    setGenerating(true);
    await new Promise(r=>setTimeout(r,1000));
    setSent(true);
    setGenerating(false);
    setTimeout(onClose, 1800);
  }

  return (
    <div style={{ position:'fixed', inset:0, zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.35)', backdropFilter:'blur(4px)' }} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-in" style={{ width:'100%', maxWidth:600, background:T.surface, borderRadius:18, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', overflow:'hidden', maxHeight:'90vh', display:'flex', flexDirection:'column' }}>
        {/* Header */}
        <div style={{ padding:'16px 20px', borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ width:32, height:32, borderRadius:9, background:`rgba(0,78,110,0.1)`, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <ComposeIcon size={16} color={T.teal} />
          </div>
          <div style={{ flex:1 }}>
            <h2 style={{ fontSize:15, fontWeight:700, color:T.text }}>Compose Email</h2>
            <p style={{ fontSize:12, color:T.muted }}>Describe what you want to write</p>
          </div>
          <button onClick={onClose} style={{ color:T.subtle, padding:6, borderRadius:8 }}><CloseIcon size={16} /></button>
        </div>

        {sent ? (
          <div style={{ padding:48, display:'flex', flexDirection:'column', alignItems:'center', gap:14 }}>
            <div style={{ width:60, height:60, borderRadius:'50%', background:'#DCFCE7', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <CheckIcon size={26} color="#16A34A" />
            </div>
            <p style={{ fontSize:16, fontWeight:700, color:T.text }}>Email sent!</p>
            <p style={{ fontSize:13, color:T.muted }}>Sent from {ACCOUNTS.find(a=>a.id===fromId)?.email}</p>
          </div>
        ) : (
          <div style={{ flex:1, overflowY:'auto', padding:20 }}>
            {/* From */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, fontWeight:600, color:T.muted, display:'block', marginBottom:5 }}>From</label>
              <select value={fromId} onChange={e=>setFromId(e.target.value)} style={{ width:'100%', padding:'9px 12px', borderRadius:9, border:`1px solid ${T.border}`, fontSize:13.5, color:T.text, outline:'none', background:T.surface }}>
                {ACCOUNTS.map(a=><option key={a.id} value={a.id}>{a.nickname} ({a.email})</option>)}
              </select>
            </div>
            {/* To */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, fontWeight:600, color:T.muted, display:'block', marginBottom:5 }}>To</label>
              <input value={to} onChange={e=>setTo(e.target.value)} placeholder="recipient@email.com" style={{ width:'100%', padding:'9px 12px', borderRadius:9, border:`1px solid ${T.border}`, fontSize:13.5, color:T.text, outline:'none' }}
                onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border} />
            </div>
            {/* Tone */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, fontWeight:600, color:T.muted, display:'block', marginBottom:7 }}>Tone</label>
              <div style={{ display:'flex', gap:6 }}>
                {TONES.map(t=>(
                  <button key={t} onClick={()=>setTone(t)} style={{ fontSize:12, padding:'5px 14px', borderRadius:20, border:`1px solid ${tone===t?T.teal:T.border}`, background:tone===t?T.teal:T.surface, color:tone===t?'#fff':T.muted, fontWeight:tone===t?600:400, textTransform:'capitalize', transition:'all 0.12s' }}>{t}</button>
                ))}
              </div>
            </div>
            {/* Prompt */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, fontWeight:600, color:T.muted, display:'block', marginBottom:5 }}>What do you want to say?</label>
              <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
                placeholder={`e.g. "Email john@client.com asking for a meeting next week to discuss the Q4 proposal"`}
                rows={4}
                style={{ width:'100%', padding:'11px 13px', borderRadius:9, border:`1px solid ${T.border}`, fontSize:13.5, color:T.text, outline:'none', resize:'none', lineHeight:1.6, fontFamily:'inherit' }}
                onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border} />
            </div>
            {/* Draft */}
            {draft && (
              <div style={{ marginBottom:14, border:`1px solid rgba(141,198,63,0.3)`, borderRadius:12, overflow:'hidden', background:'rgba(141,198,63,0.03)' }}>
                <div style={{ padding:'9px 14px', borderBottom:`1px solid rgba(141,198,63,0.2)`, display:'flex', alignItems:'center', gap:6 }}>
                  <SparkleIcon size={12} color={T.lime} />
                  <span style={{ fontSize:11, fontWeight:700, color:T.limeD, textTransform:'uppercase', letterSpacing:'0.05em' }}>AI Draft</span>
                </div>
                <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={8}
                  style={{ width:'100%', padding:'12px 14px', fontSize:13.5, color:T.text, lineHeight:1.7, resize:'none', border:'none', background:'transparent', outline:'none', fontFamily:'inherit' }} />
              </div>
            )}
          </div>
        )}

        {!sent && (
          <div style={{ padding:'12px 20px', borderTop:`1px solid ${T.border}`, display:'flex', justifyContent:'space-between', gap:10 }}>
            <button onClick={onClose} style={{ padding:'9px 18px', borderRadius:9, border:`1px solid ${T.border}`, fontSize:13.5, color:T.muted }}>Cancel</button>
            <div style={{ display:'flex', gap:8 }}>
              {!draft && (
                <button onClick={generate} disabled={!prompt.trim()||generating} style={{
                  display:'flex', alignItems:'center', gap:7, padding:'9px 18px', borderRadius:9,
                  border:`1px solid ${T.teal}`, color:T.teal, fontWeight:600, fontSize:13.5, background:'rgba(0,78,110,0.04)',
                  opacity: prompt.trim()&&!generating ? 1 : 0.5, transition:'all 0.15s',
                }}>
                  {generating ? <span className="spin"><SyncIcon size={14} color={T.teal} /></span> : <SparkleIcon size={14} color={T.teal} />}
                  {generating ? 'Generating…' : 'Generate Draft'}
                </button>
              )}
              <button onClick={handleSend} disabled={(!draft&&!prompt.trim())||generating} style={{
                display:'flex', alignItems:'center', gap:7, padding:'9px 20px', borderRadius:9,
                background:T.teal, color:'#fff', fontWeight:600, fontSize:13.5,
                boxShadow:'0 2px 8px rgba(0,78,110,0.25)', transition:'all 0.15s',
                opacity: (!draft&&!prompt.trim())||generating ? 0.5 : 1,
              }}>
                <SendIcon size={14} color="#fff" /> Send
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "accentColor": "#3fc64e",
    "sidebarColor": "#1A6B3C",
    "density": "spacious",
    "showAISummary": true
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);

  const [nav, setNav] = useState('inbox');
  const [selectedEmail, setSelectedEmail] = useState(null);
  const [search, setSearch] = useState('');
  const [syncing, setSyncing] = useState(false);
  const [composeOpen, setComposeOpen] = useState(false);

  const filteredEmails = EMAILS.filter(e =>
    !search || e.subject.toLowerCase().includes(search.toLowerCase()) || e.sender.toLowerCase().includes(search.toLowerCase())
  );

  async function handleSync() {
    setSyncing(true);
    await new Promise(r=>setTimeout(r,2000));
    setSyncing(false);
  }

  return (
    <div style={{ display:'flex', height:'100vh', width:'100vw', overflow:'hidden', background:T.bg, fontFamily:'Inter, system-ui, sans-serif',
      '--teal': tweaks.sidebarColor, '--lime': tweaks.accentColor,
    }}>
      <Sidebar nav={nav} onNav={v=>{setNav(v); setSelectedEmail(null);}} onCompose={()=>setComposeOpen(true)} syncing={syncing} onSync={handleSync} />

      <main style={{ flex:1, display:'flex', overflow:'hidden', minWidth:0 }}>
        {nav === 'inbox' && (
          <>
            <EmailList emails={filteredEmails} selectedId={selectedEmail?.id} onSelect={setSelectedEmail} search={search} onSearch={setSearch} />
            {selectedEmail ? <EmailDetail key={selectedEmail.id} email={selectedEmail} onClose={()=>setSelectedEmail(null)} /> : <EmptyDetail />}
          </>
        )}
        {nav === 'chat'    && <ChatView />}
        {nav === 'history' && <HistoryView />}
        {nav === 'settings'&& <SettingsView />}
      </main>

      {composeOpen && <ComposeModal onClose={()=>setComposeOpen(false)} />}

      <TweaksPanel>
        <TweakColor label="Sidebar color"   value={tweaks.sidebarColor} onChange={v=>setTweak('sidebarColor',v)} />
        <TweakColor label="Accent / Compose" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
        <TweakRadio label="Density" value={tweaks.density} options={['compact','comfortable','spacious']} onChange={v=>setTweak('density',v)} />
        <TweakToggle label="Show AI summary cards" value={tweaks.showAISummary} onChange={v=>setTweak('showAISummary',v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
